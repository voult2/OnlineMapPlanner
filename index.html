<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta id="saved-markers-data" name="saved-markers" content="">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mapa de Airsoft – Taboadelo</title>
<style>
:root {
  --bar: env(safe-area-inset-bottom, 0px);
  --top: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  background: #111315;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  overflow: hidden;
  touch-action: none;
}
#shell {
  display: flex;
  flex-direction: column;
  width: 100%;
  /* 100dvh (dynamic viewport height) tracks the address-bar in/out automatically.
     Falls back to 100vh on older engines; the JS block below covers the rest. */
  height: 100vh;
  height: 100dvh;
  padding-top: var(--top);
  padding-bottom: var(--bar);
}

/* ── TOP TOOLBAR ── */
#topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 12px 8px;
  background: #1c1f21;
  border-bottom: 1px solid #2e3134;
}
#field-title {
  font-size: 11px;
  font-weight: 700;
  color: #5a9e72;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#zoom-btns { display: flex; gap: 5px; }
.zbtn {
  width: 32px; height: 32px;
  border: 1px solid #3e4244;
  border-radius: 8px;
  background: #2a2d2f;
  color: #c0c8cc;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.zbtn:active { background: #3a3d3f; transform: scale(.92); }

/* ── MAP ── */
#map-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #111315;
  -webkit-touch-callout: none;
  touch-action: none;   /* block browser pan/zoom on the map canvas */
}
#map-img {
  position: absolute;
  transform-origin: 0 0;
  will-change: transform;
  -webkit-user-drag: none;
  user-select: none;
  pointer-events: none;
}
#markers-layer {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  transform-origin: 0 0;
  will-change: transform;
  z-index: 5;
}
.marker {
  position: absolute;
  transform: translate(-50%, -100%);
  pointer-events: auto;
  cursor: pointer;
  font-size: 26px;
  line-height: 1;
  filter: drop-shadow(0 2px 5px rgba(0,0,0,.95));
  transition: transform .08s;
  -webkit-user-select: none;
  user-select: none;
  /* BUG FIX 1: prevent iOS/Android long-press callout and text selection on markers */
  -webkit-touch-callout: none;
  touch-action: none;
}
.marker:active { transform: translate(-50%, -100%) scale(1.35); }
.marker-svg {
  display: block;
  width: 26px; height: 30px;
}

/* ── TOAST ── */
#toast {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,12,14,.92);
  color: #e8eeee;
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  white-space: nowrap;
  z-index: 30;
  border: 1px solid rgba(255,255,255,.12);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#toast.show { opacity: 1; }

/* ── BOTTOM MODE BAR ── */
#modebar {
  flex-shrink: 0;
  display: flex;
  gap: 0;
  background: #1c1f21;
  border-top: 1px solid #2e3134;
  position: relative; /* anchor for the flag color picker */
}

/* ── FLAG COLOUR PICKER ── */
#flag-color-picker {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  display: none;
  flex-direction: column;
  gap: 4px;
  background: #1c1f21;
  border: 1px solid #3e4244;
  border-radius: 12px;
  padding: 8px 8px;
  box-shadow: 0 -6px 24px rgba(0,0,0,.75);
  z-index: 40;
  min-width: 160px;
}
/* small triangle pointing down toward the button */
#flag-color-picker::after {
  content: '';
  position: absolute;
  bottom: -7px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-top: 7px solid #3e4244;
}
#flag-color-picker::before {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 6px solid #1c1f21;
  z-index: 1;
}
#flag-color-picker.visible { display: flex; }

/* ── OUTRO COLOUR PICKER ── same visual language, anchored above the Outro button ── */
#outro-color-picker {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 70%;
  transform: translateX(-50%);
  display: none;
  flex-direction: column;
  gap: 4px;
  background: #1c1f21;
  border: 1px solid #3e4244;
  border-radius: 12px;
  padding: 8px 8px;
  box-shadow: 0 -6px 24px rgba(0,0,0,.75);
  z-index: 40;
  min-width: 160px;
}
#outro-color-picker::after {
  content: '';
  position: absolute;
  bottom: -7px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-top: 7px solid #3e4244;
}
#outro-color-picker::before {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 6px solid #1c1f21;
  z-index: 1;
}
#outro-color-picker.visible { display: flex; }
.flag-color-btn {
  background: rgba(255,255,255,.04);
  border: 2px solid transparent;
  border-radius: 8px;
  padding: 7px 10px;
  cursor: pointer;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;
  touch-action: none;
  transition: border-color .12s, background .12s;
  display: flex; align-items: center; gap: 10px;
  white-space: nowrap;
}
.flag-color-btn-label {
  font-size: 12px;
  font-weight: 600;
  color: #c0c8cc;
  letter-spacing: .3px;
}
.flag-color-btn.active {
  border-color: #4ade80;
  background: rgba(74,222,128,.08);
}
.flag-color-btn.active .flag-color-btn-label { color: #4ade80; }
.flag-color-btn:active { background: rgba(255,255,255,.1); }
.mbtn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 4px 11px;
  border: none;
  background: transparent;
  color: #6a7880;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .3px;
  cursor: pointer;
  border-top: 2px solid transparent;
  -webkit-user-select: none; user-select: none;
  transition: background .12s;
}
.mbtn .micon { font-size: 22px; line-height: 1; }
.mbtn.active {
  color: #4ade80;
  border-top-color: #4ade80;
  background: rgba(74,222,128,.06);
}
.mbtn.active .micon { filter: drop-shadow(0 0 4px rgba(74,222,128,.5)); }
.mbtn:active { background: rgba(255,255,255,.05); }

/* ── UNDO / CLEAR FLOATING ── */
#action-btns {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 20;
}
.acbtn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid #3e4244;
  background: rgba(28,31,33,.9);
  color: #c0c8cc;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.acbtn:active { transform: scale(.9); background: #2e3134; }

#marker-popover {
  position: absolute;
  z-index: 50;
  background: #1c1f21;
  border: 1px solid #3e4244;
  border-radius: 10px;
  padding: 8px 6px;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,.6);
  pointer-events: auto;
}
@media (hover: none) and (pointer: coarse) {
  #laptop-hint { display: none; }
}
#marker-popover.visible { display: flex; }
#popover-label {
  font-size: 11px;
  color: #8a9298;
  white-space: nowrap;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 4px;
}
#popover-delete {
  width: 100%;
  padding: 7px 18px;
  background: rgba(220,60,50,.15);
  border: 1px solid rgba(220,60,50,.4);
  border-radius: 7px;
  color: #e06050;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
#popover-delete:active { background: rgba(220,60,50,.3); }
#popover-cancel {
  font-size: 11px;
  color: #6a7880;
  cursor: pointer;
  padding: 2px 8px;
}
</style>
</head>

    <div id="field-title">⚔ Campo de Taboadelo</div>

function makeOutroSVG(hex) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="30" viewBox="0 0 22 28" style="pointer-events:none"><path d="M11,1 C6.2,1 2.5,4.7 2.5,9.5 C2.5,16.5 11,27 11,27 C11,27 19.5,16.5 19.5,9.5 C19.5,4.7 15.8,1 11,1 Z" fill="${hex}" stroke="#ffffff" stroke-width="1.4"/><circle cx="11" cy="9.5" r="3.5" fill="white" opacity="0.85"/></svg>`;
}
const modeNames = { spawn:'Spawn/Respawn', flag:'Bandeira de Objetivo', cover:'Outro', oob:'Fora dos Limites' };
let mode = 'view';
let scale = 1, ox = 0, oy = 0;
let markers = [];
let dragging = false, dragStart = {}, viewStart = {x:0,y:0};
let pinching = false, pinchJustEnded = false, pinchDist = 0, pinchMid = {x:0,y:0};

// ─── Elements ────────────────────────────────────────
const wrap  = document.getElementById('map-wrap');
const img   = document.getElementById('map-img');
const ml    = document.getElementById('markers-layer');
const toast = document.getElementById('toast');

// ─── Toast ───────────────────────────────────────────
let toastTimer;
function showToast(txt) {
  toast.textContent = txt;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ─── Transform ───────────────────────────────────────
function applyT() {
  const t = `translate(${ox}px,${oy}px) scale(${scale})`;
  img.style.transform = t;
  ml.style.transform  = t;
}

function resetView() {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const iW = img.naturalWidth || 1200, iH = img.naturalHeight || 800;
  scale = Math.min(W / iW, H / iH) * 0.98;
  ox = (W - iW * scale) / 2;
  oy = (H - iH * scale) / 2;
  applyT();
}

const MIN_SCALE = 0.1;
const MAX_SCALE = 10;

function zoomAround(f, cx, cy) {
  const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * f));
  f = newScale / scale;
  ox = (ox - cx) * f + cx;
  oy = (oy - cy) * f + cy;
  scale = newScale;
  applyT();
}

// ─── Shell height: keep visible-area in sync with browser chrome ─────────────
// CSS 100dvh (declared above) is the primary fix on Edge 108+: the browser
// reflows #shell automatically whenever the address-bar appears or disappears,
// including after pinch-zoom gestures.  No JavaScript involved, no stale values.
//
// The JS block below is a fallback ONLY for browsers that do not yet understand
// 100dvh.  It must NOT run on browsers that do support it, because setting an
// inline shell.style.height overrides the CSS unit — and visualViewport.resize
// fires with transient mid-animation values during pinch-zoom, permanently
// locking the shell at the wrong height even after the CSS would have fixed it.
if (!CSS.supports || !CSS.supports('height', '100dvh')) {
  const shell = document.getElementById('shell');
  let _dvhTimer;
  function fixShellHeight() {
    // Debounce: wait until the viewport has been stable for 150 ms before
    // committing the height, so we never capture a mid-animation value.
    clearTimeout(_dvhTimer);
    _dvhTimer = setTimeout(() => {
      const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      shell.style.height = h + 'px';
    }, 150);
  }
  fixShellHeight();
  window.addEventListener('resize', fixShellHeight);
  window.addEventListener('orientationchange', fixShellHeight);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fixShellHeight);
  }
}

// ─── Init ─────────────────────────────────────────────
let markersLoaded = false;
function initMap() {
  if (markersLoaded) return;
  markersLoaded = true;
  resetView();
  loadMarkers();
}
img.onload = initMap;
if (img.complete && img.naturalWidth) setTimeout(initMap, 60);

// ─── Mode buttons ────────────────────────────────────
const flagPickerEl  = document.getElementById('flag-color-picker');
const outroPickerEl = document.getElementById('outro-color-picker');

document.querySelectorAll('.mbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.mode === 'flag') {
      // Flag button: always show/toggle the colour picker sub-menu
      outroPickerEl.classList.remove('visible'); // close other picker
      flagPickerEl.classList.toggle('visible');
      // Also activate flag mode if not already active
      if (mode !== 'flag') {
        mode = 'flag';
        document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('active', b === btn));
        wrap.style.cursor = 'crosshair';
      }
      return;
    }
    if (btn.dataset.mode === 'cover') {
      // Outro button: always show/toggle the colour picker sub-menu
      flagPickerEl.classList.remove('visible'); // close other picker
      outroPickerEl.classList.toggle('visible');
      // Also activate cover mode if not already active
      if (mode !== 'cover') {
        mode = 'cover';
        document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('active', b === btn));
        wrap.style.cursor = 'crosshair';
      }
      return;
    }
    flagPickerEl.classList.remove('visible');
    outroPickerEl.classList.remove('visible');
    mode = btn.dataset.mode;
    document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('active', b === btn));
    wrap.style.cursor = mode === 'view' ? 'grab' : 'crosshair';
  });
});

// ─── Flag colour picker ───────────────────────────────
document.querySelectorAll('#flag-color-picker .flag-color-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    flagColor = btn.dataset.color;
    // Update active ring only within the flag picker
    document.querySelectorAll('#flag-color-picker .flag-color-btn').forEach(b => b.classList.toggle('active', b === btn));
    // Update the flag button icon in the mode bar to reflect chosen colour
    document.getElementById('flag-btn-polygon').setAttribute('fill', flagColors[flagColor]);
    flagPickerEl.classList.remove('visible');
    // Ensure flag mode is active after picking a colour
    mode = 'flag';
    document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('active', b.dataset.mode === 'flag'));
    wrap.style.cursor = 'crosshair';
    showToast('🚩 Bandeira ' + flagColorNames[flagColor] + ' selecionada');
  });
  btn.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); btn.click(); }, { passive: false });
});

// ─── Outro colour picker ──────────────────────────────
document.querySelectorAll('#outro-color-picker .flag-color-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    outroColor = btn.dataset.outroColor;
    // Update active ring only within the outro picker
    document.querySelectorAll('#outro-color-picker .flag-color-btn').forEach(b => b.classList.toggle('active', b === btn));
    // Update the Outro button icon in the mode bar
    document.getElementById('outro-btn-path').setAttribute('fill', outroColors[outroColor]);
    outroPickerEl.classList.remove('visible');
    mode = 'cover';
    document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('active', b.dataset.mode === 'cover'));
    wrap.style.cursor = 'crosshair';
    showToast('📍 Outro ' + outroColorNames[outroColor] + ' selecionado');
  });
  btn.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); btn.click(); }, { passive: false });
});

// ─── Zoom buttons ────────────────────────────────────
document.getElementById('zbtn-in').addEventListener('click', () => {
  zoomAround(1.3, wrap.clientWidth/2, wrap.clientHeight/2);
});
document.getElementById('zbtn-out').addEventListener('click', () => {
  zoomAround(0.77, wrap.clientWidth/2, wrap.clientHeight/2);
});
document.getElementById('zbtn-reset').addEventListener('click', resetView);
document.getElementById('btn-undo').addEventListener('click', () => {
  const all = document.querySelectorAll('.marker');
  if (!all.length) { showToast('Nenhum marcador para desfazer'); return; }
  const lastDomEl = all[all.length - 1];
  // Remove from markers[] if tracked
  const idx = markers.findIndex(m => m.el === lastDomEl);
  if (idx !== -1) markers.splice(idx, 1);
  lastDomEl.remove();
  saveMarkers();
  showToast('Marcador removido');
});
document.getElementById('btn-clear').addEventListener('click', () => {
  // Wipe every marker from the DOM unconditionally
  const found = document.querySelectorAll('.marker');
  if (!found.length) { showToast('Nenhum marcador para limpar'); return; }
  found.forEach(el => el.remove());
  // Reset array and storage
  markers.length = 0;
  saveMarkers(); // writes empty array to localStorage
  showToast('Todos os marcadores limpos');
});

// ─── Share button — encodes markers into a URL hash ────────────────────────
// Works on every device: Web Share API on mobile, clipboard on desktop,
// prompt() as last resort. No file attachment, no server needed.
document.getElementById('zbtn-share').addEventListener('click', async () => {
  if (!markers.length) { showToast('Nenhum marcador para partilhar'); return; }

  const encoded  = encodeMarkers(markers);
  const shareUrl = window.location.href.split('#')[0] + '#' + encoded;
  const count    = markers.length;
  const txt      = count + ' marcador' + (count !== 1 ? 'es' : '') + ' incluído' + (count !== 1 ? 's' : '') + '.';

  // Web Share API — native sheet on Android / iOS
  if (navigator.share) {
    try {
      await navigator.share({ title: 'Mapa de Airsoft — Campo de Taboadelo', text: txt, url: shareUrl });
      showToast('Partilhado! 📤');
      return;
    } catch(e) {
      if (e.name === 'AbortError') return;
    }
  }

  // Clipboard API — desktop browsers and Android Chrome
  try {
    await navigator.clipboard.writeText(shareUrl);
    showToast('🔗 Link copiado!');
    return;
  } catch(e) { /* fall through */ }

  // Last resort
  prompt('Copia este link:', shareUrl);
});

// ─── Build the baked HTML blob (Save button only) ────────────────────────
function buildFileBlob(action) {
  const markerData = markers.map(m => ({ type: m.type, x: m.x, y: m.y, label: m.label, color: m.color }));
  if (!markerData.length) { showToast('Nenhum marcador para ' + (action || 'guardar')); return null; }

  hidePopover();

  let src = document.documentElement.outerHTML;

  const jsonStr = JSON.stringify(markerData)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;');

  const metaSplit = 'id="saved-markers-data"';
  const metaStart = src.indexOf('<meta ' + metaSplit);
  if (metaStart === -1) { showToast('Guardar falhou — etiqueta meta em falta'); return null; }
  const metaEnd = src.indexOf('>', metaStart) + 1;
  src = src.slice(0, metaStart) +
    '<meta ' + metaSplit + ' name="saved-markers" content="' + jsonStr + '">' +
    src.slice(metaEnd);

  if (!src.startsWith('<!DOCTYPE')) src = '<!DOCTYPE html>\n' + src;

  return { blob: new Blob([src], { type: 'text/html' }), count: markerData.length };
}

// ─── URL-hash marker encoding ─────────────────────────────────────────────
function encodeMarkers(arr) {
  const compact = arr.map(m => ({ t:m.type, x:Math.round(m.x), y:Math.round(m.y), l:m.label, c:m.color }));
  const bytes = new TextEncoder().encode(JSON.stringify(compact));
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function decodeMarkersFromHash(b64) {
  try {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const arr = JSON.parse(new TextDecoder().decode(bytes));
    return arr.map(m => ({ type:m.t, x:m.x, y:m.y, label:m.l, color:m.c }));
  } catch(e) { return null; }
}

// ─── Place marker ────────────────────────────────────
function placeMarker(mx, my, type, label, color) {
  const el = document.createElement('div');
  el.className = 'marker';
  if (type === 'flag') {
    el.innerHTML = makeFlagSVG(flagColors[color || 'red']);
  } else if (type === 'cover') {
    el.innerHTML = makeOutroSVG(outroColors[color || 'red']);
  } else {
    el.textContent = modeEmoji[type];
  }
  el.style.left = mx + 'px';
  el.style.top  = my + 'px';
  el.title = label;

  let popoverOpenedByTouch = false;

  el.addEventListener('touchstart', e => {
    e.stopPropagation();
    e.preventDefault();
  }, { passive: false });

  el.addEventListener('touchend', e => {
    e.stopPropagation();
    e.preventDefault();
    popoverOpenedByTouch = true;
    showPopover(el, mx, my, label);
    setTimeout(() => { popoverOpenedByTouch = false; }, 300);
  }, { passive: false });

  el.addEventListener('click', e => {
    e.stopPropagation();
    if (popoverOpenedByTouch) return;
    showPopover(el, mx, my, label);
  });

  ml.appendChild(el);
  markers.push({ el, type, x: mx, y: my, label, color });
}

const popoverEl     = document.getElementById('marker-popover');
const popoverLabel  = document.getElementById('popover-label');
const popoverDelete = document.getElementById('popover-delete');
const popoverCancel = document.getElementById('popover-cancel');
let   popoverTarget = null;

function showPopover(markerEl, mx, my, label) {
  popoverTarget = markerEl;
  popoverLabel.textContent = label;
  const wrapRect = wrap.getBoundingClientRect();
  const screenX = mx * scale + ox;
  const screenY = my * scale + oy;
  popoverEl.classList.add('visible');
  const pw = popoverEl.offsetWidth || 160;
  const ph = popoverEl.offsetHeight || 90;
  let left = screenX - pw / 2;
  let top  = screenY - ph - 12;
  left = Math.max(6, Math.min(left, wrapRect.width - pw - 6));
  top  = Math.max(6, top < 6 ? screenY + 28 : top);
  popoverEl.style.left = left + 'px';
  popoverEl.style.top  = top  + 'px';
}

function hidePopover() {
  popoverEl.classList.remove('visible');
  popoverTarget = null;
}

popoverEl.addEventListener('touchstart', e => { e.stopPropagation(); }, { passive: false });
popoverEl.addEventListener('touchend',   e => { e.stopPropagation(); }, { passive: false });

popoverDelete.addEventListener('click', () => {
  if (!popoverTarget) return;
  const idx = markers.findIndex(m => m.el === popoverTarget);
  if (idx !== -1) markers.splice(idx, 1);
  popoverTarget.remove();
  saveMarkers();
  hidePopover();
  showToast('Marcador removido');
});

popoverCancel.addEventListener('click', hidePopover);

let popoverJustDismissed = false;
wrap.addEventListener('pointerdown', e => {
  flagPickerEl.classList.remove('visible');   // close colour pickers on any map tap
  outroPickerEl.classList.remove('visible');
  if (popoverEl.classList.contains('visible') &&
      !popoverEl.contains(e.target)) {
    hidePopover();
    popoverJustDismissed = true;
    if (mode === 'view') setTimeout(() => { popoverJustDismissed = false; }, 0);
  }
}, true);

// ─── Save / Load ─────────────────────────────────────
function saveMarkers() {
  const data = markers.map(m => ({ type: m.type, x: m.x, y: m.y, label: m.label, color: m.color }));
  try { localStorage.setItem('airsoft_markers', JSON.stringify(data)); } catch(e) {}
}

function loadMarkers() {
  try {
    document.querySelectorAll('.marker').forEach(el => el.remove());
    markers.length = 0;

    let data = null;

    // 1. URL hash — highest priority (someone opened a shared link)
    const hash = window.location.hash.slice(1);
    if (hash) {
      data = decodeMarkersFromHash(hash);
    }

    // 2. <meta> tag — explicitly saved into this file
    if (!data) {
      const metaEl = document.getElementById('saved-markers-data');
      const metaContent = metaEl && metaEl.getAttribute('content');
      if (metaContent) {
        const parsed = JSON.parse(metaContent);
        if (parsed && parsed.length) {
          data = parsed;
          try { localStorage.setItem('airsoft_markers', JSON.stringify(data)); } catch(e) {}
        }
      }
    }

    // 3. localStorage — edits made on this device
    if (!data) {
      const raw = localStorage.getItem('airsoft_markers');
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.length) data = parsed;
      }
    }

    if (data) {
      data.forEach(m => placeMarker(m.x, m.y, m.type, m.label, m.color));
    }
  } catch(e) { console.error('loadMarkers error:', e); }
}

function getMapCoords(cx, cy) {
  const r = wrap.getBoundingClientRect();
  return { x: (cx - r.left - ox) / scale, y: (cy - r.top - oy) / scale };
}

// ─── Laptop pan helpers ──────────────────────────────
let spaceDown  = false;
let middleDrag = false;

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat && document.activeElement === document.body) {
    e.preventDefault();
    spaceDown = true;
    wrap.style.cursor = 'grab';
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    spaceDown = false;
    if (!dragging && !middleDrag)
      wrap.style.cursor = mode === 'view' ? 'grab' : 'crosshair';
  }
});

wrap.addEventListener('contextmenu', e => { e.preventDefault(); });

// ─── Pointer events (mouse / stylus) ─────────────────
wrap.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch') return;
  if (e.target !== wrap && e.target !== img && e.target !== ml) return;
  if (pinching) return;
  dragStart = { x: e.clientX, y: e.clientY };
  viewStart = { x: ox, y: oy };
  const isPan = (mode === 'view') || spaceDown || (e.button === 1);
  if (isPan) {
    dragging   = true;
    middleDrag = (e.button === 1);
    wrap.style.cursor = 'grabbing';
    wrap.setPointerCapture(e.pointerId);
  }
});

wrap.addEventListener('pointermove', e => {
  if (e.pointerType === 'touch') return;
  if (dragging) {
    ox = viewStart.x + (e.clientX - dragStart.x);
    oy = viewStart.y + (e.clientY - dragStart.y);
    applyT();
  }
});

wrap.addEventListener('pointerup', e => {
  if (e.pointerType === 'touch') return;
  if (e.target !== wrap && e.target !== img && e.target !== ml) return;
  const dx   = (dragStart.x !== undefined) ? e.clientX - dragStart.x : 0;
  const dy   = (dragStart.y !== undefined) ? e.clientY - dragStart.y : 0;
  const dist = Math.hypot(dx, dy);
  const wasPanning = middleDrag || (dragging && spaceDown);
  if (dragging) {
    dragging   = false;
    middleDrag = false;
    wrap.style.cursor = spaceDown ? 'grab' : (mode === 'view' ? 'grab' : 'crosshair');
  }
  if (mode !== 'view' && e.button === 0 && !wasPanning && dist < 8)
    placeTap(e.clientX, e.clientY);
});

// ─── Place on tap ────────────────────────────────────
function placeTap(cx, cy) {
  if (popoverJustDismissed) { popoverJustDismissed = false; return; }
  const { x, y } = getMapCoords(cx, cy);
  const iW = img.naturalWidth || 1200, iH = img.naturalHeight || 800;
  if (x < 0 || y < 0 || x > iW || y > iH) return;
  const label = mode === 'flag'
    ? 'Bandeira ' + flagColorNames[flagColor]
    : mode === 'cover'
      ? 'Outro ' + outroColorNames[outroColor]
      : modeNames[mode];
  const markerColor = mode === 'flag' ? flagColor : mode === 'cover' ? outroColor : undefined;
  placeMarker(x, y, mode, label, markerColor);
  saveMarkers();
  const modePlacedPt = { spawn: 'colocado', flag: 'colocada', cover: 'colocado', oob: 'marcado' };
  showToast(
    (mode === 'flag' ? '\uD83D\uDEA9' : mode === 'cover' ? '\uD83D\uDCCD' : modeEmoji[mode]) + ' ' + label + ' ' + modePlacedPt[mode]
  );
}

// ─── Touch events (mobile) ───────────────────────────
let activeTouches = {};

wrap.addEventListener('touchstart', e => {
  // Prevent the browser from classifying this as a native scroll/zoom gesture.
  e.preventDefault();
  [...e.changedTouches].forEach(t => activeTouches[t.identifier] = {x: t.clientX, y: t.clientY});
  const ids = Object.keys(activeTouches);
  if (ids.length === 2) {
    pinching = true;
    dragging = false;
    dragStart = {};
    const t0 = activeTouches[ids[0]], t1 = activeTouches[ids[1]];
    pinchDist = Math.hypot(t1.x - t0.x, t1.y - t0.y);
    pinchMid  = { x: (t0.x + t1.x) / 2, y: (t0.y + t1.y) / 2 };
  } else if (ids.length === 1) {
    const t = activeTouches[ids[0]];
    dragStart = { x: t.x, y: t.y };
    viewStart = { x: ox, y: oy };
  }
}, { passive: false });

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  // Prune ghost entries: on Edge/Chrome, touchmove can fire for a remaining
  // finger before touchend fires for the lifted one. Stale activeTouches
  // entries would produce a spurious zoom tick.
  const liveSet = new Set([...e.touches].map(t => String(t.identifier)));
  Object.keys(activeTouches).forEach(id => { if (!liveSet.has(id)) delete activeTouches[id]; });

  [...e.changedTouches].forEach(t => activeTouches[t.identifier] = {x: t.clientX, y: t.clientY});
  const ids = Object.keys(activeTouches);

  if (ids.length === 2 && pinching) {
    const t0 = activeTouches[ids[0]], t1 = activeTouches[ids[1]];
    const d   = Math.hypot(t1.x - t0.x, t1.y - t0.y);
    const mid = { x: (t0.x + t1.x) / 2, y: (t0.y + t1.y) / 2 };
    const r   = wrap.getBoundingClientRect();
    ox += mid.x - pinchMid.x;
    oy += mid.y - pinchMid.y;
    const f = d / pinchDist;
    const cx = mid.x - r.left, cy = mid.y - r.top;
    const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * f));
    const actualF = newScale / scale;
    ox = (ox - cx) * actualF + cx;
    oy = (oy - cy) * actualF + cy;
    scale = newScale;
    pinchDist = d;
    pinchMid  = mid;
    applyT();
  } else if (ids.length === 1 && !pinching) {
    // Allow single-finger pan in ALL modes (not just view) — after a pinch
    // zoom the user can pan regardless of which tool is active.
    const id = ids[0];
    const t  = activeTouches[id];
    if (dragStart.x !== undefined) {
      ox = viewStart.x + (t.x - dragStart.x);
      oy = viewStart.y + (t.y - dragStart.y);
      applyT();
    }
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  const changed = [...e.changedTouches];
  changed.forEach(t => delete activeTouches[t.identifier]);
  const remaining = Object.keys(activeTouches).length;

  if (changed.length === 1 && !pinching && !pinchJustEnded && mode !== 'view') {
    const t  = changed[0];
    const ds = dragStart;
    const moved = ds.x !== undefined && Math.hypot(t.clientX - ds.x, t.clientY - ds.y) >= 8;
    if (!moved) placeTap(t.clientX, t.clientY);
  }

  if (remaining < 2) {
    if (pinching) pinchJustEnded = true;
    pinching  = false;
    dragStart = {};
    viewStart = { x: ox, y: oy };
    if (remaining === 1) {
      // Use the live touch list for the freshest position of the remaining finger.
      const live = e.touches.length === 1 ? e.touches[0] : null;
      if (live) {
        activeTouches[live.identifier] = { x: live.clientX, y: live.clientY };
        dragStart = { x: live.clientX, y: live.clientY };
      } else {
        const id = Object.keys(activeTouches)[0];
        dragStart = { x: activeTouches[id].x, y: activeTouches[id].y };
      }
    }
    if (remaining === 0) pinchJustEnded = false;
  }
}, { passive: true });

wrap.addEventListener('touchcancel', e => {
  [...e.changedTouches].forEach(t => delete activeTouches[t.identifier]);
  if (Object.keys(activeTouches).length < 2) {
    pinching       = false;
    pinchJustEnded = false;
    dragStart = {};
    viewStart = { x: ox, y: oy };
  }
}, { passive: true });

// ─── Scroll wheel (desktop) ──────────────────────────
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.15 : 0.87;
  const r = wrap.getBoundingClientRect();
  zoomAround(f, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });
</script>
</body>
